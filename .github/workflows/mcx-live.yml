name: MCX Live Stock Price Poll

on:
  schedule:
    # Every 5 minutes, 3:25–11:00 UTC = 8:55 AM–4:30 PM IST (Mon–Fri)
    - cron: '*/5 3-10 * * 1-5'
    - cron: '0,5,10,15,20,25,30 11 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-live-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-live-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run MCX live poller
        run: python scripts/mcx_live_poller.py

      - name: Commit data file
        run: |
          git config user.name "Research-Tusk"
          git config user.email "research@tuskinvest.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add dashboard/data/mcx_live.json
          git diff --cached --quiet && echo "No changes" || \
            git commit -m "📡 MCX Live update: $(date -u +%Y-%m-%d\ %H:%M\ UTC)"
          git push || true

      - name: Summary
        run: |
          SIZE=$(wc -c < dashboard/data/mcx_live.json 2>/dev/null || echo "?")
          echo "### MCX Live Poll" >> $GITHUB_STEP_SUMMARY
          echo "- **Time:** $(date -u +%Y-%m-%d\ %H:%M\ UTC)" >> $GITHUB_STEP_SUMMARY
          echo "- **File size:** ${SIZE} bytes" >> $GITHUB_STEP_SUMMARY
