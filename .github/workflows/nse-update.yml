name: NSE Daily Update

on:
  schedule:
    # 6:00 AM IST = 00:30 UTC (Mon-Fri)
    - cron: '30 0 * * 1-5'
  workflow_dispatch:
    # Manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  fetch-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NSE pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python scripts/nse_pipeline.py

      - name: Check if new data was added
        id: check_new
        run: |
          NEW_DAYS=$(cat .new_days_count 2>/dev/null || echo "0")
          echo "new_days=$NEW_DAYS" >> $GITHUB_OUTPUT
          echo "New trading days: $NEW_DAYS"

      - name: Commit and push updated data
        if: steps.check_new.outputs.new_days != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/dashboard_data.json data/enriched_data.json dashboard/app.js
          git commit -m "📊 Daily update: $(date +%Y-%m-%d) — ${{ steps.check_new.outputs.new_days }} new trading day(s)" || true
          git push

      - name: Summary
        run: |
          echo "### NSE Pipeline Run Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Date:** $(date +%Y-%m-%d)" >> $GITHUB_STEP_SUMMARY
          echo "- **New days added:** ${{ steps.check_new.outputs.new_days }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_new.outputs.new_days }}" != "0" ]; then
            echo "- **Status:** ✅ Data updated, Vercel will auto-deploy" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Status:** ℹ️ No new data (holiday or already up to date)" >> $GITHUB_STEP_SUMMARY
          fi
