<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NSE Live · Market Turnover & Revenue</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { mono: ["'JetBrains Mono'", "ui-monospace", "monospace"] },
        },
      },
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #000; color: #f5f5f7; }
    @keyframes glow {
      0%   { box-shadow: 0 0 0 0 rgba(0,113,227,0); }
      40%  { box-shadow: 0 0 14px 5px rgba(0,113,227,0.4); }
      100% { box-shadow: 0 0 0 0 rgba(0,113,227,0); }
    }
    @keyframes glowGold {
      0%   { box-shadow: 0 0 0 0 rgba(251,191,36,0); }
      40%  { box-shadow: 0 0 14px 5px rgba(251,191,36,0.3); }
      100% { box-shadow: 0 0 0 0 rgba(251,191,36,0); }
    }
    .card-pulse      { animation: glow     0.7s ease-out; }
    .card-pulse-gold { animation: glowGold 0.7s ease-out; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
  </style>
</head>
<body class="font-mono min-h-screen bg-black">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const {
  AreaChart, Area, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid, Legend,
} = Recharts;

// ---------------------------------------------------------------------------
// Formatters
// ---------------------------------------------------------------------------
function fmtCr(val, decimals = 2) {
  if (val == null || val === "" || isNaN(Number(val))) return "—";
  const n = Number(val);
  if (Math.abs(n) >= 1e5) return "₹" + (n / 1e5).toFixed(decimals) + " L Cr";
  if (Math.abs(n) >= 1)   return "₹" + n.toFixed(decimals) + " Cr";
  return "₹" + (n * 100).toFixed(2) + " L";
}

function fmtNum(val, decimals = 2) {
  if (val == null || val === "" || isNaN(Number(val))) return "—";
  return Number(val).toLocaleString("en-IN", {
    minimumFractionDigits: decimals,
    maximumFractionDigits: decimals,
  });
}

function fmtTime(iso) {
  if (!iso) return "—";
  try {
    return new Date(iso).toLocaleTimeString("en-IN", {
      hour: "2-digit", minute: "2-digit", second: "2-digit",
    });
  } catch { return iso; }
}

function fmtDateTime(iso) {
  if (!iso) return "—";
  try {
    return new Date(iso).toLocaleString("en-IN", {
      day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit",
    });
  } catch { return iso; }
}

function staleMins(iso) {
  if (!iso) return null;
  const diffMs = Date.now() - new Date(iso).getTime();
  return Math.floor(diffMs / 60000);
}

// ---------------------------------------------------------------------------
// Atoms
// ---------------------------------------------------------------------------
function Skeleton({ className = "" }) {
  return <div className={`bg-zinc-800 rounded animate-pulse ${className}`} />;
}

function ChangeBadge({ pct, variation }) {
  const p = Number(pct);
  const up = p >= 0;
  return (
    <span className={`text-sm font-semibold tabular-nums ${up ? "text-green-400" : "text-red-400"}`}>
      {up ? "▲" : "▼"} {Math.abs(p).toFixed(2)}%
      {variation !== undefined && variation !== "" &&
        <span className="text-xs ml-1 opacity-60">({up ? "+" : ""}{fmtNum(variation, 2)})</span>}
    </span>
  );
}

function StatusPill({ status }) {
  const open = String(status).toLowerCase() === "open";
  return (
    <span className={`inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-semibold
      ${open ? "bg-green-900/60 text-green-400" : "bg-red-900/60 text-red-400"}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${open ? "bg-green-400 animate-pulse" : "bg-red-500"}`} />
      {open ? "OPEN" : "CLOSED"}
    </span>
  );
}

function StatCard({ title, value, sub, badge, pulse: doPulse, gold = false }) {
  const ref = useRef(null);
  useEffect(() => {
    if (doPulse && ref.current) {
      const cls = gold ? "card-pulse-gold" : "card-pulse";
      ref.current.classList.remove(cls);
      void ref.current.offsetWidth;
      ref.current.classList.add(cls);
    }
  }, [doPulse]);
  return (
    <div ref={ref} className={`bg-zinc-900 border rounded-xl p-5 flex flex-col gap-1
      ${gold ? "border-yellow-700/50" : "border-zinc-800"}`}>
      <div className="text-xs text-zinc-500 uppercase tracking-widest mb-1">{title}</div>
      <div className={`text-2xl font-bold tabular-nums tracking-tight
        ${gold ? "text-yellow-300" : "text-white"}`}>{value}</div>
      {badge && <div className="mt-1">{badge}</div>}
      {sub && <div className="text-xs text-zinc-500 mt-1">{sub}</div>}
    </div>
  );
}

// ---------------------------------------------------------------------------
// Revenue section
// ---------------------------------------------------------------------------
const TR_FUT  = 0.00173 / 100 * 2;
const TR_OPT  = 0.03503 / 100 * 2;
const TR_CASH = 0.00297 / 100 * 2;

function RevenueSection({ revenue, pulse: doPulse }) {
  if (!revenue) {
    return (
      <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-5">
        <div className="text-xs text-zinc-500 uppercase tracking-widest mb-4">Exchange Revenue Estimate</div>
        <div className="flex flex-col items-center justify-center py-8 text-zinc-600">
          <svg className="w-9 h-9 mb-3 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={1.5}
              d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 11h.01M12 11h.01M15 11h.01M12 7h.01M9 7H7a2 2 0 00-2 2v9a2 2 0 002 2h10a2 2 0 002-2V9a2 2 0 00-2-2h-2" />
          </svg>
          <p className="text-sm font-medium">Market Closed</p>
          <p className="text-xs mt-1 opacity-60">Revenue data available 9:15 AM – 3:30 PM IST</p>
        </div>
      </div>
    );
  }

  const { has_data } = revenue;

  const segments = [
    {
      label: "Futures", turnover: revenue.futures_turnover, turnoverLabel: "INR Turnover",
      rev: revenue.futures_revenue, rateLabel: "0.00173% × 2",
      color: "text-blue-400", bg: "bg-blue-950/40 border-blue-800/50",
    },
    {
      label: "Options", turnover: revenue.options_premium, turnoverLabel: "Premium Turnover",
      rev: revenue.options_revenue, rateLabel: "0.03503% × 2",
      color: "text-purple-400", bg: "bg-purple-950/40 border-purple-800/50",
    },
    {
      label: "Cash (Equity)", turnover: revenue.cash_traded_value, turnoverLabel: "Trade Value",
      rev: revenue.cash_revenue, rateLabel: "0.00297% × 2",
      color: "text-emerald-400", bg: "bg-emerald-950/40 border-emerald-800/50",
    },
  ];

  return (
    <div className="bg-zinc-900 border border-yellow-700/40 rounded-xl p-5">
      <div className="flex items-center justify-between mb-5">
        <div className="text-xs text-zinc-500 uppercase tracking-widest">Exchange Revenue Estimate</div>
        {has_data
          ? <span className="text-xs text-yellow-400 font-semibold">Live</span>
          : <span className="text-xs text-zinc-600">Awaiting turnover fields</span>}
      </div>

      {/* Total hero */}
      <div className="mb-6">
        <StatCard
          title="Total Estimated Revenue (Today)"
          value={has_data ? fmtCr(revenue.total_revenue, 4) : "—"}
          sub="Futures + Options + Cash · both-side take rate"
          pulse={doPulse}
          gold
        />
      </div>

      {/* Per-segment cards */}
      <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-6">
        {segments.map(seg => (
          <div key={seg.label} className={`border rounded-xl p-4 ${seg.bg}`}>
            <div className={`text-xs font-semibold uppercase tracking-widest mb-3 ${seg.color}`}>
              {seg.label}
            </div>
            <div className="space-y-2 text-xs">
              <div className="flex justify-between">
                <span className="text-zinc-500">{seg.turnoverLabel}</span>
                <span className="tabular-nums text-zinc-200 font-medium">
                  {has_data ? fmtCr(seg.turnover) : "—"}
                </span>
              </div>
              <div className="flex justify-between">
                <span className="text-zinc-500">Take rate</span>
                <span className="tabular-nums text-zinc-400">{seg.rateLabel}</span>
              </div>
              <div className="border-t border-zinc-700/50 pt-2 flex justify-between">
                <span className="text-zinc-400 font-semibold">Revenue</span>
                <span className={`tabular-nums font-bold ${seg.color}`}>
                  {has_data ? fmtCr(seg.rev, 4) : "—"}
                </span>
              </div>
            </div>
          </div>
        ))}
      </div>

      {/* Breakdown table */}
      <div className="text-xs text-zinc-500 uppercase tracking-widest mb-3">Detailed Breakdown</div>
      <div className="overflow-x-auto">
        <table className="w-full text-xs">
          <thead>
            <tr className="text-zinc-500 border-b border-zinc-800">
              <th className="text-left py-2 pr-4">Segment</th>
              <th className="text-right py-2 pr-4">Turnover / Premium (₹ Cr)</th>
              <th className="text-right py-2 pr-4">Take Rate</th>
              <th className="text-right py-2">Revenue (₹ Cr)</th>
            </tr>
          </thead>
          <tbody>
            {[
              ["Index Futures", "text-blue-400", revenue.index_futures_turnover, "0.00173% × 2", revenue.index_futures_turnover * TR_FUT, "text-blue-300"],
              ["Stock Futures", "text-blue-400", revenue.stock_futures_turnover, "0.00173% × 2", revenue.stock_futures_turnover * TR_FUT, "text-blue-300"],
            ].map(([label, lc, tv, rate, rev, rc]) => (
              <tr key={label} className="border-b border-zinc-800/40">
                <td className={`py-1.5 pr-4 ${lc}`}>{label}</td>
                <td className="py-1.5 pr-4 text-right tabular-nums">{has_data ? fmtNum(tv) : "—"}</td>
                <td className="py-1.5 pr-4 text-right text-zinc-500">{rate}</td>
                <td className={`py-1.5 text-right tabular-nums ${rc}`}>{has_data ? fmtNum(rev, 4) : "—"}</td>
              </tr>
            ))}
            <tr className="border-b border-zinc-800/40 font-semibold">
              <td className="py-1.5 pr-4 text-blue-300">Futures Total</td>
              <td className="py-1.5 pr-4 text-right tabular-nums">{has_data ? fmtNum(revenue.futures_turnover) : "—"}</td>
              <td className="py-1.5 pr-4"></td>
              <td className="py-1.5 text-right tabular-nums text-blue-300">{has_data ? fmtNum(revenue.futures_revenue, 4) : "—"}</td>
            </tr>
            {[
              ["Index Options Premium", "text-purple-400", revenue.index_options_premium, "0.03503% × 2", revenue.index_options_premium * TR_OPT, "text-purple-300"],
              ["Stock Options Premium", "text-purple-400", revenue.stock_options_premium, "0.03503% × 2", revenue.stock_options_premium * TR_OPT, "text-purple-300"],
            ].map(([label, lc, tv, rate, rev, rc]) => (
              <tr key={label} className="border-b border-zinc-800/40">
                <td className={`py-1.5 pr-4 ${lc}`}>{label}</td>
                <td className="py-1.5 pr-4 text-right tabular-nums">{has_data ? fmtNum(tv) : "—"}</td>
                <td className="py-1.5 pr-4 text-right text-zinc-500">{rate}</td>
                <td className={`py-1.5 text-right tabular-nums ${rc}`}>{has_data ? fmtNum(rev, 4) : "—"}</td>
              </tr>
            ))}
            <tr className="border-b border-zinc-800/40 font-semibold">
              <td className="py-1.5 pr-4 text-purple-300">Options Total</td>
              <td className="py-1.5 pr-4 text-right tabular-nums">{has_data ? fmtNum(revenue.options_premium) : "—"}</td>
              <td className="py-1.5 pr-4"></td>
              <td className="py-1.5 text-right tabular-nums text-purple-300">{has_data ? fmtNum(revenue.options_revenue, 4) : "—"}</td>
            </tr>
            <tr className="border-b border-zinc-800/40">
              <td className="py-1.5 pr-4 text-emerald-400">Cash / Equity</td>
              <td className="py-1.5 pr-4 text-right tabular-nums">{has_data ? fmtNum(revenue.cash_traded_value) : "—"}</td>
              <td className="py-1.5 pr-4 text-right text-zinc-500">0.00297% × 2</td>
              <td className="py-1.5 text-right tabular-nums text-emerald-300">{has_data ? fmtNum(revenue.cash_revenue, 4) : "—"}</td>
            </tr>
            <tr className="font-bold text-sm">
              <td className="py-2 pr-4 text-yellow-300">TOTAL</td>
              <td className="py-2 pr-4"></td>
              <td className="py-2 pr-4"></td>
              <td className="py-2 text-right tabular-nums text-yellow-300">
                {has_data ? fmtNum(revenue.total_revenue, 4) : "—"}
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      {!has_data && (
        <div className="mt-4 text-xs text-zinc-600 border border-zinc-800 rounded-lg p-3">
          Turnover API returned data but segment fields are not yet mapped.
          Check <code>scripts/nse_live_poller.py</code> → <code>compute_revenue()</code> once markets open and log the API keys.
        </div>
      )}
    </div>
  );
}

// ---------------------------------------------------------------------------
// Revenue history chart
// ---------------------------------------------------------------------------
function RevenueHistoryChart({ history }) {
  const points = (history || [])
    .filter(d => d.revenue?.has_data)
    .map(d => ({
      t:       fmtTime(d.timestamp),
      futures: d.revenue.futures_revenue,
      options: d.revenue.options_revenue,
      cash:    d.revenue.cash_revenue,
      total:   d.revenue.total_revenue,
    }));

  if (points.length === 0) {
    return (
      <div className="h-28 flex items-center justify-center text-zinc-600 text-xs">
        Collecting revenue history — available during market hours (9:15 AM – 3:30 PM IST)
      </div>
    );
  }

  return (
    <ResponsiveContainer width="100%" height={140}>
      <AreaChart data={points} margin={{ top: 4, right: 4, left: 4, bottom: 4 }}>
        <defs>
          {[["gFut","#60a5fa"],["gOpt","#a78bfa"],["gCash","#34d399"]].map(([id, c]) => (
            <linearGradient key={id} id={id} x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stopColor={c} stopOpacity={0.4} />
              <stop offset="95%" stopColor={c} stopOpacity={0} />
            </linearGradient>
          ))}
        </defs>
        <CartesianGrid strokeDasharray="3 3" stroke="#1f1f1f" />
        <XAxis dataKey="t" hide />
        <YAxis hide domain={["auto", "auto"]} />
        <Tooltip
          contentStyle={{ background: "#1c1c1e", border: "1px solid #333", borderRadius: 6, fontSize: 11 }}
          labelStyle={{ color: "#999" }}
          formatter={(v, name) => [fmtCr(v, 4), name]}
        />
        <Legend wrapperStyle={{ fontSize: 11, color: "#71717a" }} />
        <Area type="monotone" dataKey="futures" name="Futures Rev" stroke="#60a5fa" strokeWidth={1.5} fill="url(#gFut)"  dot={false} />
        <Area type="monotone" dataKey="options"  name="Options Rev"  stroke="#a78bfa" strokeWidth={1.5} fill="url(#gOpt)"  dot={false} />
        <Area type="monotone" dataKey="cash"     name="Cash Rev"     stroke="#34d399" strokeWidth={1.5} fill="url(#gCash)" dot={false} />
      </AreaChart>
    </ResponsiveContainer>
  );
}

// ---------------------------------------------------------------------------
// Market segments table
// ---------------------------------------------------------------------------
function MarketStateTable({ marketState }) {
  if (!marketState?.length) return null;
  return (
    <div className="overflow-x-auto">
      <table className="w-full text-xs">
        <thead>
          <tr className="text-zinc-500 border-b border-zinc-800">
            <th className="text-left py-2 pr-4">Market</th>
            <th className="text-left py-2 pr-4">Status</th>
            <th className="text-left py-2 pr-4">Index / Underlying</th>
            <th className="text-right py-2 pr-4">Last</th>
            <th className="text-right py-2">Change</th>
          </tr>
        </thead>
        <tbody>
          {marketState.map((m, i) => (
            <tr key={i} className="border-b border-zinc-800/50 hover:bg-zinc-800/30">
              <td className="py-2 pr-4 text-zinc-300">{m.market}</td>
              <td className="py-2 pr-4"><StatusPill status={m.marketStatus} /></td>
              <td className="py-2 pr-4 text-zinc-400">{m.index || m.underlying || "—"}</td>
              <td className="py-2 pr-4 text-right tabular-nums">
                {m.last !== "" && m.last != null ? fmtNum(m.last) : "—"}
              </td>
              <td className="py-2 text-right tabular-nums">
                {m.percentChange !== "" && m.percentChange != null
                  ? <ChangeBadge pct={m.percentChange} />
                  : "—"}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ---------------------------------------------------------------------------
// App
// ---------------------------------------------------------------------------
const POLL_MS = 5 * 60 * 1000; // 5 minutes — matches GitHub Actions cron

function App() {
  const [data,        setData]        = useState(null);
  const [lastFetched, setLastFetched] = useState(null);
  const [pulse,       setPulse]       = useState(false);
  const [error,       setError]       = useState(null);
  const [loading,     setLoading]     = useState(true);

  const fetchAll = useCallback(async () => {
    try {
      // Cache-bust so browser always gets fresh file
      const res = await fetch(`./data/nse_live.json?t=${Date.now()}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const d = await res.json();
      setData(d);
      setLastFetched(new Date());
      setError(null);
      setLoading(false);
      setPulse(p => !p);
    } catch (e) {
      setError("Could not load nse_live.json — data updates every 5 min during market hours");
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    fetchAll();
    const id = setInterval(fetchAll, POLL_MS);
    return () => clearInterval(id);
  }, [fetchAll]);

  const marketStatus = data?.market_status;
  const revenue      = data?.revenue;
  const history      = data?.history ?? [];
  const updatedAt    = data?.updated_at;

  const nifty     = marketStatus?.marketState?.find(m => m.market === "Capital Market");
  const marketcap = marketStatus?.marketcap;
  const giftnifty = marketStatus?.giftnifty;
  const segments  = marketStatus?.marketState ?? [];

  const stale = staleMins(updatedAt);

  return (
    <div className="min-h-screen bg-black text-white font-mono">

      {/* Header */}
      <header className="border-b border-zinc-800 sticky top-0 z-20 bg-black/90 backdrop-blur-sm">
        <div className="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-4">
            {/* Back to main dashboard */}
            <a href="/" className="text-zinc-600 hover:text-zinc-300 transition-colors text-xs">← Dashboard</a>
            <span className="text-zinc-800">|</span>
            <span className="font-bold tracking-tight">NSE Live</span>
            {nifty ? (
              <div className="flex items-center gap-2">
                <span className="text-zinc-400 text-xs">NIFTY 50</span>
                <span className="text-lg font-bold tabular-nums">{fmtNum(nifty.last)}</span>
                <ChangeBadge pct={nifty.percentChange} variation={nifty.variation} />
                <StatusPill status={nifty.marketStatus} />
              </div>
            ) : loading ? <div className="bg-zinc-800 rounded animate-pulse w-48 h-5" /> : null}
          </div>
          <div className="flex items-center gap-3">
            {/* Staleness indicator */}
            {stale !== null && (
              <span className={`text-xs tabular-nums ${stale > 10 ? "text-yellow-600" : "text-zinc-600"}`}>
                {stale === 0 ? "just now" : `${stale}m ago`}
              </span>
            )}
            {updatedAt && (
              <span className="text-zinc-700 text-xs tabular-nums hidden sm:block">
                {fmtDateTime(updatedAt)}
              </span>
            )}
            <button onClick={fetchAll} className="text-zinc-500 hover:text-zinc-200 transition-colors p-1" title="Refresh">
              <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
                  d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
              </svg>
            </button>
          </div>
        </div>
      </header>

      <main className="max-w-7xl mx-auto px-4 py-6 space-y-6">

        {/* Staleness warning */}
        {stale !== null && stale > 10 && (
          <div className="bg-yellow-950/40 border border-yellow-800/60 rounded-xl p-3 flex items-center gap-3">
            <svg className="w-4 h-4 text-yellow-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p className="text-yellow-400/80 text-xs">
              Data is {stale} min old — GitHub Actions polls every 5 min during market hours (9:15 AM–3:30 PM IST).
            </p>
          </div>
        )}

        {/* Error */}
        {error && (
          <div className="bg-red-950/60 border border-red-800 rounded-xl p-4 flex items-center gap-3">
            <svg className="w-5 h-5 text-red-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
                d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
            </svg>
            <p className="text-red-300 text-xs">{error}</p>
          </div>
        )}

        {/* Stat cards */}
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
          {loading && !nifty ? <Skeleton className="h-32" /> :
            nifty ? (
              <StatCard title="NIFTY 50" value={fmtNum(nifty.last)}
                badge={<ChangeBadge pct={nifty.percentChange} variation={nifty.variation} />}
                sub={nifty.tradeDate} pulse={pulse} />
            ) : null}

          {loading && !marketcap ? <Skeleton className="h-32" /> :
            marketcap ? (
              <StatCard title="Market Cap"
                value={`₹${marketcap.marketCapinLACCRRupeesFormatted} L Cr`}
                sub={`$${marketcap.marketCapinTRDollars}T · ${marketcap.timeStamp}`}
                pulse={pulse} />
            ) : null}

          {loading && !giftnifty ? <Skeleton className="h-32" /> :
            giftnifty ? (
              <StatCard title="GIFT Nifty Futures" value={fmtNum(giftnifty.LASTPRICE)}
                badge={<ChangeBadge pct={giftnifty.PERCHANGE} variation={giftnifty.DAYCHANGE} />}
                sub={`Exp: ${giftnifty.EXPIRYDATE} · ${Number(giftnifty.CONTRACTSTRADED).toLocaleString("en-IN")} contracts`}
                pulse={pulse} />
            ) : null}

          <StatCard title="History Snapshots" value={String(history.length)}
            sub="last 4 hrs · 5-min intervals" pulse={pulse} />
        </div>

        {/* Revenue — primary section */}
        <RevenueSection revenue={revenue} pulse={pulse} />

        {/* Revenue history chart */}
        {history.length > 0 && (
          <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-5">
            <div className="text-xs text-zinc-500 uppercase tracking-widest mb-4">
              Revenue History (last 4 hrs · 5-min snapshots)
            </div>
            <RevenueHistoryChart history={history} />
          </div>
        )}

        {/* Market segments */}
        <div className="bg-zinc-900 border border-zinc-800 rounded-xl p-5">
          <div className="text-xs text-zinc-500 uppercase tracking-widest mb-4">Market Segments</div>
          {loading
            ? <div className="space-y-2">{[1,2,3].map(i => <Skeleton key={i} className="h-8" />)}</div>
            : <MarketStateTable marketState={segments} />}
        </div>

        <footer className="text-center text-zinc-700 text-xs py-4 border-t border-zinc-900">
          NSE India · Updated every 5 min via GitHub Actions · Market hours 9:15 AM – 3:30 PM IST Mon–Fri ·
          Revenue = take rate × 2 (both sides)
        </footer>

      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
