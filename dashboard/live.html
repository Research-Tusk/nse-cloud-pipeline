<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NSE Live · Revenue</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { mono: ["'JetBrains Mono'", "ui-monospace", "monospace"] } } },
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: #000; color: #f5f5f7; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
  </style>
</head>
<body class="font-mono min-h-screen bg-black">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;
const { LineChart, Line, XAxis, YAxis, Tooltip, ResponsiveContainer, ReferenceLine, CartesianGrid } = Recharts;

// ---------------------------------------------------------------------------
// Formatters
// ---------------------------------------------------------------------------
function fmtCr(val, dp = 1) {
  if (val == null || isNaN(Number(val))) return "—";
  const n = Number(val);
  if (Math.abs(n) >= 1e5) return "₹" + (n / 1e5).toFixed(dp) + " L Cr";
  if (Math.abs(n) >= 1)   return "₹" + n.toFixed(dp) + " Cr";
  return "₹" + (n * 100).toFixed(dp) + " L";
}

function fmtInt(val) {
  if (val == null || isNaN(Number(val))) return "—";
  return Number(val).toLocaleString("en-IN", { maximumFractionDigits: 0 });
}

function fmtDateTime(iso) {
  if (!iso) return "—";
  try {
    return new Date(iso).toLocaleString("en-IN", {
      day: "2-digit", month: "short", hour: "2-digit", minute: "2-digit",
    });
  } catch { return iso; }
}

function staleMins(iso) {
  if (!iso) return null;
  return Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
}

// ---------------------------------------------------------------------------
// Atoms
// ---------------------------------------------------------------------------
function StatusPill({ status }) {
  const open = String(status).toLowerCase() === "open";
  return (
    <span className={`inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-semibold
      ${open ? "bg-green-950 text-green-400 border border-green-800" : "bg-zinc-900 text-zinc-500 border border-zinc-800"}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${open ? "bg-green-400 animate-pulse" : "bg-zinc-600"}`} />
      {open ? "OPEN" : "CLOSED"}
    </span>
  );
}

function ChangeBadge({ pct, variation }) {
  const p = Number(pct);
  const up = p >= 0;
  return (
    <span className={`text-sm font-semibold tabular-nums ${up ? "text-green-400" : "text-red-400"}`}>
      {up ? "▲" : "▼"}{Math.abs(p).toFixed(1)}%
      {variation !== undefined && variation !== "" &&
        <span className="text-xs ml-1 opacity-50">{up ? "+" : ""}{Number(variation).toFixed(0)}</span>}
    </span>
  );
}

// ---------------------------------------------------------------------------
// Revenue hero
// ---------------------------------------------------------------------------
function RevenueHero({ revenue, pulse }) {
  const ref = useRef(null);
  useEffect(() => {
    if (pulse && ref.current) {
      ref.current.style.opacity = "0.5";
      setTimeout(() => { if (ref.current) ref.current.style.opacity = "1"; }, 200);
    }
  }, [pulse]);

  if (!revenue || !revenue.has_data) {
    return (
      <div className="border border-zinc-800 rounded-2xl p-8 text-center">
        <div className="text-xs text-zinc-600 uppercase tracking-widest mb-3">Total Revenue Today</div>
        <div className="text-3xl font-bold text-zinc-700">—</div>
        <div className="text-xs text-zinc-600 mt-3">
          NSE publishes today's turnover 1–2 hrs after market close (3:30 PM IST).
        </div>
      </div>
    );
  }

  return (
    <div ref={ref} className="border border-zinc-700 rounded-2xl p-8" style={{ transition: "opacity 0.2s" }}>
      <div className="flex items-start justify-between mb-2">
        <div className="text-xs text-zinc-500 uppercase tracking-widest">Total Revenue Today</div>
        <span className="text-xs text-zinc-400 tabular-nums">● {revenue.trade_date}</span>
      </div>
      <div className="text-5xl font-bold tabular-nums text-white mb-1">
        {fmtCr(revenue.total_revenue, 1)}
      </div>
      <div className="text-xs text-zinc-600 mt-2">Futures + Options + Cash · both-side transaction charge</div>

      {/* 3 segment cards */}
      <div className="grid grid-cols-3 gap-3 mt-6">
        {[
          {
            label: "Futures",
            rev: revenue.futures_revenue,
            sub: `INR turnover`,
            val: revenue.futures_turnover,
            color: "text-blue-400",
            border: "border-blue-900",
          },
          {
            label: "Options",
            rev: revenue.options_revenue,
            sub: `Premium`,
            val: revenue.options_premium,
            color: "text-purple-400",
            border: "border-purple-900",
          },
          {
            label: "Cash",
            rev: revenue.cash_revenue,
            sub: `Traded value`,
            val: revenue.cash_traded_value,
            color: "text-emerald-400",
            border: "border-emerald-900",
          },
        ].map(seg => (
          <div key={seg.label} className={`border ${seg.border} rounded-xl p-4 bg-zinc-950`}>
            <div className={`text-xs uppercase tracking-widest mb-2 ${seg.color}`}>{seg.label}</div>
            <div className="text-xl font-bold text-white tabular-nums">{fmtCr(seg.rev, 1)}</div>
            <div className="text-xs text-zinc-600 mt-1.5">
              {seg.sub} · <span className="text-zinc-500">{fmtCr(seg.val, 0)}</span>
            </div>
            {/* Sub-segments */}
            {seg.label === "Futures" && (
              <div className="mt-2 space-y-0.5 text-xs text-zinc-600">
                <div className="flex justify-between">
                  <span>Index</span>
                  <span className="tabular-nums text-zinc-500">{fmtCr(revenue.index_futures_turnover, 0)}</span>
                </div>
                <div className="flex justify-between">
                  <span>Stock</span>
                  <span className="tabular-nums text-zinc-500">{fmtCr(revenue.stock_futures_turnover, 0)}</span>
                </div>
              </div>
            )}
            {seg.label === "Options" && (
              <div className="mt-2 space-y-0.5 text-xs text-zinc-600">
                <div className="flex justify-between">
                  <span>Index</span>
                  <span className="tabular-nums text-zinc-500">{fmtCr(revenue.index_options_premium, 0)}</span>
                </div>
                <div className="flex justify-between">
                  <span>Stock</span>
                  <span className="tabular-nums text-zinc-500">{fmtCr(revenue.stock_options_premium, 0)}</span>
                </div>
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Hourly progression table + prediction chart
// ---------------------------------------------------------------------------
function HourlySection({ hourly, currentRevenue }) {
  if (!hourly || !hourly.snapshots?.length) return null;
  const snaps = hourly.snapshots;

  // Chart data: predicted EOD at each snapshot
  const chartData = snaps
    .filter(s => s.predicted_eod)
    .map(s => ({ label: s.hour_label, predicted: s.predicted_eod, actual: s.total_revenue }));

  const lastPred = snaps[snaps.length - 1]?.predicted_eod;

  return (
    <div className="border border-zinc-800 rounded-2xl p-6">
      <div className="flex items-start justify-between mb-5">
        <div>
          <div className="text-xs text-zinc-500 uppercase tracking-widest">Intraday Progression</div>
          <div className="text-xs text-zinc-600 mt-1">Hourly revenue + linear end-of-day projection</div>
        </div>
        {lastPred && (
          <div className="text-right">
            <div className="text-xs text-zinc-500 uppercase tracking-widest mb-1">Latest Forecast</div>
            <div className="text-lg font-bold text-white tabular-nums">{fmtCr(lastPred, 1)}</div>
          </div>
        )}
      </div>

      {/* Table */}
      <table className="w-full text-xs mb-6">
        <thead>
          <tr className="text-zinc-600 border-b border-zinc-800">
            <th className="text-left py-1.5 pr-4 font-normal">Hour (IST)</th>
            <th className="text-right py-1.5 pr-4 font-normal">Revenue</th>
            <th className="text-right py-1.5 pr-4 font-normal text-blue-500">Futures</th>
            <th className="text-right py-1.5 pr-4 font-normal text-purple-500">Options</th>
            <th className="text-right py-1.5 pr-4 font-normal text-emerald-500">Cash</th>
            <th className="text-right py-1.5 font-normal text-zinc-500">Pred. EOD</th>
          </tr>
        </thead>
        <tbody>
          {snaps.map((s, i) => {
            const isLast = i === snaps.length - 1;
            return (
              <tr key={s.hour_label} className={`border-b border-zinc-800/40 ${isLast ? "text-white" : "text-zinc-400"}`}>
                <td className="py-1.5 pr-4 tabular-nums">{s.hour_label}</td>
                <td className="py-1.5 pr-4 text-right tabular-nums font-semibold">
                  {s.has_data ? fmtCr(s.total_revenue, 1) : "—"}
                </td>
                <td className="py-1.5 pr-4 text-right tabular-nums text-blue-500">
                  {s.has_data ? fmtCr(s.futures_revenue, 1) : "—"}
                </td>
                <td className="py-1.5 pr-4 text-right tabular-nums text-purple-500">
                  {s.has_data ? fmtCr(s.options_revenue, 1) : "—"}
                </td>
                <td className="py-1.5 pr-4 text-right tabular-nums text-emerald-500">
                  {s.has_data ? fmtCr(s.cash_revenue, 1) : "—"}
                </td>
                <td className="py-1.5 text-right tabular-nums text-zinc-400">
                  {s.predicted_eod ? fmtCr(s.predicted_eod, 1) : "—"}
                </td>
              </tr>
            );
          })}
        </tbody>
      </table>

      {/* Chart: predicted EOD line */}
      {chartData.length >= 2 && (
        <ResponsiveContainer width="100%" height={110}>
          <LineChart data={chartData} margin={{ top: 4, right: 8, left: 4, bottom: 4 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#1a1a1a" />
            <XAxis dataKey="label" tick={{ fontSize: 10, fill: "#52525b" }} tickLine={false} axisLine={false} />
            <YAxis
              tick={{ fontSize: 10, fill: "#52525b" }}
              tickLine={false}
              axisLine={false}
              width={45}
              tickFormatter={v => fmtCr(v, 0).replace("₹", "")}
              domain={["auto", "auto"]}
            />
            <Tooltip
              contentStyle={{ background: "#0a0a0a", border: "1px solid #27272a", borderRadius: 6, fontSize: 11 }}
              labelStyle={{ color: "#71717a" }}
              formatter={(v, name) => [fmtCr(v, 1), name]}
            />
            <Line type="monotone" dataKey="predicted" name="Pred. EOD"
              stroke="#fff" strokeWidth={1.5} dot={{ r: 3, fill: "#fff" }} strokeDasharray="4 2" />
            <Line type="monotone" dataKey="actual" name="Revenue so far"
              stroke="#52525b" strokeWidth={1.5} dot={{ r: 3, fill: "#52525b" }} />
          </LineChart>
        </ResponsiveContainer>
      )}
      <div className="flex gap-4 mt-2 text-xs text-zinc-600">
        <span><span className="inline-block w-6 border-t border-dashed border-white mr-1" style={{verticalAlign:'middle'}}></span>Predicted EOD</span>
        <span><span className="inline-block w-6 border-t border-zinc-600 mr-1" style={{verticalAlign:'middle'}}></span>Actual revenue</span>
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Monthly history bar chart
// ---------------------------------------------------------------------------
function MonthHistory({ history }) {
  if (!history?.length) return null;
  const data = history
    .filter(d => d.revenue?.has_data)
    .map(d => ({
      t:     d.timestamp.slice(0, 5),   // "01-Apr" → "01-Ap"
      total: d.revenue.total_revenue,
    }));
  if (!data.length) return null;

  return (
    <div className="border border-zinc-800 rounded-2xl p-6">
      <div className="text-xs text-zinc-500 uppercase tracking-widest mb-4">This Month — Daily Revenue</div>
      <ResponsiveContainer width="100%" height={100}>
        <LineChart data={data} margin={{ top: 4, right: 8, left: 4, bottom: 4 }}>
          <CartesianGrid strokeDasharray="3 3" stroke="#1a1a1a" />
          <XAxis dataKey="t" tick={{ fontSize: 10, fill: "#52525b" }} tickLine={false} axisLine={false} />
          <YAxis
            tick={{ fontSize: 10, fill: "#52525b" }}
            tickLine={false} axisLine={false} width={40}
            tickFormatter={v => v.toFixed(0)}
            domain={["auto", "auto"]}
          />
          <Tooltip
            contentStyle={{ background: "#0a0a0a", border: "1px solid #27272a", borderRadius: 6, fontSize: 11 }}
            labelStyle={{ color: "#71717a" }}
            formatter={(v) => [fmtCr(v, 1), "Revenue"]}
          />
          <Line type="monotone" dataKey="total" name="Revenue"
            stroke="#fff" strokeWidth={1.5} dot={{ r: 3, fill: "#fff" }} />
        </LineChart>
      </ResponsiveContainer>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Market segments
// ---------------------------------------------------------------------------
function SegmentsTable({ marketState }) {
  if (!marketState?.length) return null;
  return (
    <div className="border border-zinc-800 rounded-2xl p-5">
      <div className="text-xs text-zinc-500 uppercase tracking-widest mb-4">Market Segments</div>
      <table className="w-full text-xs">
        <thead>
          <tr className="text-zinc-600 border-b border-zinc-800">
            <th className="text-left py-1.5 pr-4 font-normal">Market</th>
            <th className="text-left py-1.5 pr-4 font-normal">Status</th>
            <th className="text-left py-1.5 pr-4 font-normal">Index</th>
            <th className="text-right py-1.5 pr-4 font-normal">Last</th>
            <th className="text-right py-1.5 font-normal">Change</th>
          </tr>
        </thead>
        <tbody>
          {marketState.map((m, i) => (
            <tr key={i} className="border-b border-zinc-800/30">
              <td className="py-1.5 pr-4 text-zinc-300">{m.market}</td>
              <td className="py-1.5 pr-4"><StatusPill status={m.marketStatus} /></td>
              <td className="py-1.5 pr-4 text-zinc-600">{m.index || m.underlying || "—"}</td>
              <td className="py-1.5 pr-4 text-right tabular-nums text-zinc-300">
                {m.last !== "" && m.last != null ? fmtInt(m.last) : "—"}
              </td>
              <td className="py-1.5 text-right tabular-nums">
                {m.percentChange !== "" && m.percentChange != null
                  ? <ChangeBadge pct={m.percentChange} variation={m.variation} />
                  : "—"}
              </td>
            </tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ---------------------------------------------------------------------------
// App
// ---------------------------------------------------------------------------
const POLL_MS = 5 * 60 * 1000;

function App() {
  const [live,        setLive]        = useState(null);
  const [hourly,      setHourly]      = useState(null);
  const [lastFetched, setLastFetched] = useState(null);
  const [pulse,       setPulse]       = useState(false);
  const [error,       setError]       = useState(null);
  const [loading,     setLoading]     = useState(true);

  const fetchAll = useCallback(async () => {
    try {
      const bust = Date.now();
      const [liveRes, hourlyRes] = await Promise.all([
        fetch(`./data/nse_live.json?t=${bust}`),
        fetch(`./data/nse_live_hourly.json?t=${bust}`).catch(() => null),
      ]);
      if (!liveRes.ok) throw new Error(`HTTP ${liveRes.status}`);
      const liveData = await liveRes.json();
      setLive(liveData);

      if (hourlyRes && hourlyRes.ok) {
        const hData = await hourlyRes.json();
        setHourly(hData);
      }

      setLastFetched(new Date());
      setError(null);
      setLoading(false);
      setPulse(p => !p);
    } catch (e) {
      setError("Could not load nse_live.json");
      setLoading(false);
    }
  }, []);

  useEffect(() => {
    fetchAll();
    const id = setInterval(fetchAll, POLL_MS);
    return () => clearInterval(id);
  }, [fetchAll]);

  const marketStatus = live?.market_status;
  const revenue      = live?.revenue;
  const history      = live?.history ?? [];
  const updatedAt    = live?.updated_at;

  const nifty     = marketStatus?.marketState?.find(m => m.market === "Capital Market");
  const marketcap = marketStatus?.marketcap;
  const giftnifty = marketStatus?.giftnifty;
  const segments  = marketStatus?.marketState ?? [];

  const stale = staleMins(updatedAt);

  return (
    <div className="min-h-screen bg-black text-white font-mono">

      {/* Header */}
      <header className="border-b border-zinc-900 sticky top-0 z-20 bg-black">
        <div className="max-w-5xl mx-auto px-4 py-3 flex items-center justify-between">
          <div className="flex items-center gap-4">
            <a href="/" className="text-zinc-700 hover:text-zinc-400 transition-colors text-xs">← Dashboard</a>
            <span className="text-zinc-900">|</span>
            <span className="font-bold text-sm tracking-tight">NSE Live</span>
            {nifty && (
              <div className="flex items-center gap-2">
                <span className="text-zinc-600 text-xs">NIFTY 50</span>
                <span className="text-sm font-bold tabular-nums">
                  {Number(nifty.last).toLocaleString("en-IN", { minimumFractionDigits: 1, maximumFractionDigits: 1 })}
                </span>
                <ChangeBadge pct={nifty.percentChange} variation={nifty.variation} />
                <StatusPill status={nifty.marketStatus} />
              </div>
            )}
          </div>
          <div className="flex items-center gap-3 text-xs text-zinc-700 tabular-nums">
            {stale !== null && (
              <span className={stale > 10 ? "text-yellow-700" : ""}>
                {stale === 0 ? "just now" : `${stale}m ago`}
              </span>
            )}
            {updatedAt && <span className="hidden sm:block">{fmtDateTime(updatedAt)}</span>}
            <button onClick={fetchAll} className="text-zinc-700 hover:text-zinc-400 transition-colors p-1" title="Refresh">
              <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2}
                  d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
              </svg>
            </button>
          </div>
        </div>
      </header>

      <main className="max-w-5xl mx-auto px-4 py-6 space-y-4">

        {/* Stale warning */}
        {stale !== null && stale > 10 && (
          <div className="border border-yellow-900/60 rounded-xl px-4 py-2.5 flex items-center gap-2">
            <span className="text-yellow-700 text-xs">
              Data is {stale}m old — GitHub Actions polls every 5 min during market hours.
            </span>
          </div>
        )}

        {error && (
          <div className="border border-red-900 rounded-xl px-4 py-3 text-red-400 text-xs">{error}</div>
        )}

        {/* Market cap + GIFT Nifty bar */}
        {(marketcap || giftnifty) && (
          <div className="flex gap-4 text-xs text-zinc-500">
            {marketcap && (
              <span>
                <span className="text-zinc-700 mr-1">Mkt Cap</span>
                ₹{marketcap.marketCapinLACCRRupeesFormatted} L Cr
                <span className="text-zinc-700 ml-1">/ ${marketcap.marketCapinTRDollars}T</span>
              </span>
            )}
            {giftnifty && (
              <span>
                <span className="text-zinc-700 mr-1">GIFT Nifty</span>
                {Number(giftnifty.LASTPRICE).toLocaleString("en-IN")}
                <span className={`ml-1 ${Number(giftnifty.PERCHANGE) >= 0 ? "text-green-600" : "text-red-600"}`}>
                  {Number(giftnifty.PERCHANGE) >= 0 ? "▲" : "▼"}{Math.abs(Number(giftnifty.PERCHANGE)).toFixed(1)}%
                </span>
                <span className="text-zinc-700 ml-1">exp {giftnifty.EXPIRYDATE}</span>
              </span>
            )}
          </div>
        )}

        {/* Revenue hero */}
        {loading && !revenue
          ? <div className="border border-zinc-900 rounded-2xl p-8 animate-pulse bg-zinc-950 h-48" />
          : <RevenueHero revenue={revenue} pulse={pulse} />}

        {/* Hourly progression */}
        <HourlySection hourly={hourly} currentRevenue={revenue} />

        {/* Monthly history */}
        <MonthHistory history={history} />

        {/* Market segments */}
        {loading
          ? <div className="border border-zinc-900 rounded-2xl p-5 animate-pulse bg-zinc-950 h-32" />
          : <SegmentsTable marketState={segments} />}

        <div className="text-center text-zinc-800 text-xs py-3">
          NSE India · GitHub Actions every 5 min · Hourly snapshots 10 AM–3:30 PM IST
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
